<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹跑酷 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            /* Prevent scroll on touch devices */
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* HUD Styles */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
            z-index: 10;
        }

        .hud-stat {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Pause Button Styles */
        #top-pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 8px 15px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2) inset;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        #top-pause-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px #0ff;
        }

        /* UI Overlays (Start & Game Over) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 15, 0.85);
            z-index: 20;
            color: #fff;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            color: #f0f;
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f;
            text-transform: uppercase;
        }

        p.instructions {
            font-size: 1.1rem;
            color: #0ff;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.5;
            text-shadow: 0 0 5px #0ff;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 30px;
            background: rgba(0, 255, 255, 0.1);
            padding: 20px;
            border: 1px solid #0ff;
            border-radius: 8px;
        }

        .key {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 10px;
        }

        .btn {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3) inset;
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
        }

        #game-over-screen {
            display: none;
        }

        .final-score {
            font-size: 2rem;
            color: #ff0055;
            text-shadow: 0 0 15px #ff0055;
            margin-bottom: 30px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- HUD -->
    <div id="hud" style="display: none;">
        <div class="hud-stat" id="score-display">距離: 0 m</div>
        <div class="hud-stat" id="speed-display">速度: 0 km/h</div>
        <div class="hud-stat" id="high-score-display" style="color: #ffaa00;">最高: 0 m</div>
    </div>

    <!-- Top Right Pause Button -->
    <button id="top-pause-btn" style="display: none;">⏸ 暫停</button>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1>霓虹跑酷</h1>
            <p class="instructions">在網格中生存。速度將無限提升，請保持專注與快速反應。</p>
            <div class="controls-grid">
                <div><span class="key">← / →</span> 切換車道 (左右滑動)</div>
                <div><span class="key">↑</span> 跳躍 (向上滑動)</div>
                <div><span class="key">↓</span> 蹲下 (向下滑動)</div>
                <div><span class="key">Space</span> 跳躍</div>
            </div>
            <button class="btn" id="start-btn">開始遊戲</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen">
            <h1>系統崩潰</h1>
            <div class="final-score" id="final-distance">最終距離: 0 m</div>
            <div id="new-record-msg" style="color: #ffaa00; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; display: none; text-shadow: 0 0 10px #ffaa00;">🏆 新最高紀錄！</div>
            <button class="btn" id="restart-btn">重新開始</button>
        </div>

        <!-- Pause Screen -->
        <div id="pause-screen" style="display: none;">
            <h1>系統暫停</h1>
            <p class="instructions">按下 'P' 或 'ESC' 繼續</p>
            <button class="btn" id="resume-btn">繼續執行</button>
        </div>
    </div>

    <!-- Three.js Canvas Container -->
    <div id="game-canvas"></div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /**
         * NEON RUNNER 3D - High Performance Infinite Runner
         */

        // Game Configuration & State
        const CONFIG = {
            laneWidth: 4,
            baseSpeed: 30, // Units per second
            speedMultiplier: 0.05, // Speed increment per unit traveled
            maxSpeed: 120,
            jumpForce: 22,
            gravity: -60,
            fogColor: 0x050510,
            trackLength: 300,
            spawnZDistance: -180, // Spawn objects far ahead
            despawnZDistance: 20 // Remove objects after they pass the camera
        };

        const STATE = {
            isPlaying: false,
            isPaused: false,
            speed: CONFIG.baseSpeed,
            distance: 0,
            highScore: 0,
            lane: 0, // -1 (left), 0 (center), 1 (right)
            isJumping: false,
            isDucking: false,
            yVelocity: 0,
            duckTimer: 0
        };

        // DOM Elements
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const pauseScreen = document.getElementById('pause-screen');
        const hud = document.getElementById('hud');
        const topPauseBtn = document.getElementById('top-pause-btn');
        const scoreDisplay = document.getElementById('score-display');
        const speedDisplay = document.getElementById('speed-display');
        const finalDistanceDisplay = document.getElementById('final-distance');
        const highScoreDisplay = document.getElementById('high-score-display');
        const newRecordMsg = document.getElementById('new-record-msg');

        // Three.js Core Variables
        let scene, camera, renderer, clock;

        // Game Objects
        let player;
        let playerBox = new THREE.Box3();
        let obstacles = [];
        let gridHelper;
        let starGeo, starSystem;

        // Materials (Cached for performance)
        const materials = {
            player: new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x0088ff, emissiveIntensity: 0.8, roughness: 0.2 }),
            block: new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xaa0022, emissiveIntensity: 0.8 }),
            low: new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x888800, emissiveIntensity: 0.8 }),
            high: new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0x880088, emissiveIntensity: 0.8 })
        };

        // Geometries
        const geometries = {
            player: new THREE.BoxGeometry(1.5, 1.5, 1.5),
            block: new THREE.BoxGeometry(3.6, 2, 2),  // Full block
            low: new THREE.BoxGeometry(3.6, 1, 1.5),  // Low obstacle (jump)
            high: new THREE.BoxGeometry(3.6, 0.5, 1.5) // High obstacle (duck)
        };

        // Spawning Logic
        let distanceSinceLastSpawn = 0;
        let currentSpawnInterval = 40; // Initial distance between obstacle rows

        // --- Audio System (Web Audio API) ---
        const AudioController = {
            ctx: null,
            bgmOsc: null,
            bgmGain: null,
            lfo: null,
            isPlaying: false,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            playBGM() {
                this.init();
                if (this.isPlaying) return;
                this.isPlaying = true;
                
                const ctx = this.ctx;
                const tempo = 140; // BPM
                const lookahead = 25.0; // ms
                const scheduleAheadTime = 0.1; // s
                let currentNote = 0;
                let nextNoteTime = ctx.currentTime + 0.1;
                
                // Synthwave sequence (C minor pentatonic arpeggio)
                const bassNotes = [
                    65.41, 65.41, 130.81, 65.41, // C2, C2, C3, C2
                    77.78, 77.78, 155.56, 77.78, // Eb2, Eb2, Eb3, Eb2
                    98.00, 98.00, 196.00, 98.00, // G2, G2, G3, G2
                    58.27, 58.27, 116.54, 58.27  // Bb1, Bb1, Bb2, Bb1
                ];
                
                this.schedulerTimer = setInterval(() => {
                    if (!this.isPlaying) return;
                    
                    while (nextNoteTime < ctx.currentTime + scheduleAheadTime) {
                        const freq = bassNotes[currentNote % bassNotes.length];
                        
                        // Create oscillators for a softer synth sound
                        const osc1 = ctx.createOscillator();
                        osc1.type = 'triangle';
                        const osc2 = ctx.createOscillator();
                        osc2.type = 'sine';
                        // Detune second oscillator slightly
                        osc2.detune.value = 5; 
                        
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        // Plucky filter envelope (softer)
                        filter.frequency.setValueAtTime(100, nextNoteTime);
                        filter.frequency.exponentialRampToValueAtTime(600, nextNoteTime + 0.05);
                        filter.frequency.exponentialRampToValueAtTime(100, nextNoteTime + 0.2);
                        
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0.01, nextNoteTime);
                        gain.gain.linearRampToValueAtTime(0.08, nextNoteTime + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + 0.2);
                        
                        osc1.connect(filter);
                        osc2.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        
                        osc1.frequency.value = freq;
                        // Mix the square wave an octave lower for bass
                        osc2.frequency.value = freq / 2;
                        
                        osc1.start(nextNoteTime);
                        osc2.start(nextNoteTime);
                        osc1.stop(nextNoteTime + 0.2);
                        osc2.stop(nextNoteTime + 0.2);
                        
                        // Advance note (16th notes)
                        const secondsPerBeat = 60.0 / tempo;
                        nextNoteTime += 0.25 * secondsPerBeat;
                        currentNote++;
                    }
                }, lookahead);
            },

            stopBGM() {
                if (!this.isPlaying) return;
                this.isPlaying = false;
                if (this.schedulerTimer) {
                    clearInterval(this.schedulerTimer);
                }
            },

            playCrash() {
                this.init();
                const osc = this.ctx.createOscillator();
                osc.type = 'square';
                
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
                
                this.stopBGM();
            }
        };

        // Initialize Game
        function init() {
            // Setup Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.fogColor);
            scene.fog = new THREE.Fog(CONFIG.fogColor, 20, 150);

            // Setup Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 250);
            camera.position.set(0, 6, 14); // Elevated, behind player
            camera.lookAt(0, 2, -20);

            // Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            // Setup Clock
            clock = new THREE.Clock();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0x00ffff, 0xff00ff, 0.5);
            scene.add(hemiLight);

            const pointLight = new THREE.PointLight(0x00ffff, 1, 50);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);

            // Create Environment (Moving Grid)
            gridHelper = new THREE.GridHelper(200, 40, 0x00ffff, 0xff00ff);
            gridHelper.position.y = 0;
            // Extend grid far back
            gridHelper.position.z = -50;
            scene.add(gridHelper);

            // Create Starfield (Speed effect)
            starGeo = new THREE.BufferGeometry();
            const starCount = 1000;
            const starPositions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPositions[i * 3] = (Math.random() - 0.5) * 200; // x: -100 to 100
                starPositions[i * 3 + 1] = Math.random() * 50;      // y: 0 to 50
                starPositions[i * 3 + 2] = (Math.random() - 0.5) * 300; // z: -150 to 150
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            let starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.5,
                transparent: true,
                opacity: 0.8
            });
            starSystem = new THREE.Points(starGeo, starMat);
            scene.add(starSystem);

            // Create Player
            player = new THREE.Mesh(geometries.player, materials.player);
            player.position.set(0, 0.75, 0);
            scene.add(player);

            // Load High Score
            STATE.highScore = parseInt(localStorage.getItem('neonRunnerHighScore')) || 0;
            highScoreDisplay.innerText = `最高: ${STATE.highScore} m`;

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', handleKeyDown, false);
            setupTouchControls();

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);
            document.getElementById('resume-btn').addEventListener('click', togglePause);
            topPauseBtn.addEventListener('click', togglePause);

            // Start animation loop (renders background menu state)
            renderer.setAnimationLoop(gameLoop);
        }

        function startGame() {
            // Reset State
            STATE.isPlaying = true;
            STATE.isPaused = false;
            STATE.speed = CONFIG.baseSpeed;
            STATE.distance = 0;
            STATE.lane = 0;
            STATE.isJumping = false;
            STATE.isDucking = false;
            STATE.yVelocity = 0;

            // Reset Player Visually
            player.position.set(0, 0.75, 0);
            player.scale.set(1, 1, 1);
            playerBox.setFromObject(player);

            // Clear Obstacles
            obstacles.forEach(obs => scene.remove(obs.mesh));
            obstacles = [];
            distanceSinceLastSpawn = 0;
            currentSpawnInterval = 50;

            // Update UI
            uiLayer.style.display = 'none';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            newRecordMsg.style.display = 'none'; // Hide new record message
            hud.style.display = 'block';
            topPauseBtn.style.display = 'block';

            // Start Audio
            AudioController.playBGM();

            clock.start();
        }

        function gameOver() {
            STATE.isPlaying = false;

            // Play Crash Sound
            AudioController.playCrash();

            // Visual feedback (flash red)
            scene.background.setHex(0x550000);
            setTimeout(() => { scene.background.setHex(CONFIG.fogColor); }, 100);

            // Update High Score
            let currentScore = Math.floor(STATE.distance);
            if (currentScore > STATE.highScore) {
                STATE.highScore = currentScore;
                localStorage.setItem('neonRunnerHighScore', STATE.highScore);
                highScoreDisplay.innerText = `最高: ${STATE.highScore} m`;
                newRecordMsg.style.display = 'block';
            }

            // Update UI
            uiLayer.style.display = 'flex';
            gameOverScreen.style.display = 'block';
            pauseScreen.style.display = 'none';
            hud.style.display = 'none';
            topPauseBtn.style.display = 'none';
            finalDistanceDisplay.innerText = `最終距離: ${currentScore} m`;
        }

        function togglePause() {
            if (!STATE.isPlaying) return;

            STATE.isPaused = !STATE.isPaused;

            if (STATE.isPaused) {
                uiLayer.style.display = 'flex';
                pauseScreen.style.display = 'block';
                topPauseBtn.style.display = 'none';
            } else {
                uiLayer.style.display = 'none';
                pauseScreen.style.display = 'none';
                topPauseBtn.style.display = 'block';
            }
        }

        // --- Core Mechanics ---

        function handleKeyDown(event) {
            if (!STATE.isPlaying) return;

            if (event.code === 'KeyP' || event.code === 'Escape') {
                togglePause();
                return;
            }

            if (STATE.isPaused) return;

            switch (event.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    moveLane(-1);
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveLane(1);
                    break;
                case 'ArrowUp':
                case 'KeyW':
                case 'Space':
                    jump();
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    duck();
                    break;
            }
        }

        function setupTouchControls() {
            let startX = 0;
            let startY = 0;
            const threshold = 30; // Minimum swipe distance

            document.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: false });

            document.addEventListener('touchend', e => {
                if (!STATE.isPlaying) return;

                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const diffX = endX - startX;
                const diffY = endY - startY;

                // Determine swipe direction based on dominant axis
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // Horizontal Swipe
                    if (Math.abs(diffX) > threshold) {
                        if (diffX > 0) moveLane(1);
                        else moveLane(-1);
                    }
                } else {
                    // Vertical Swipe
                    if (Math.abs(diffY) > threshold) {
                        if (diffY < 0) jump(); // Swipe up
                        else duck();           // Swipe down
                    }
                }
            }, { passive: false });
        }

        function moveLane(direction) {
            STATE.lane += direction;
            // Clamp lane between -1 (Left), 0 (Center), 1 (Right)
            STATE.lane = Math.max(-1, Math.min(1, STATE.lane));
        }

        function jump() {
            if (!STATE.isJumping) {
                STATE.isJumping = true;
                STATE.yVelocity = CONFIG.jumpForce;

                // If we were ducking, cancel it to allow jumping
                if (STATE.isDucking) {
                    STATE.isDucking = false;
                    player.scale.y = 1;
                }
            }
        }

        function duck() {
            if (!STATE.isJumping && !STATE.isDucking) {
                STATE.isDucking = true;
                STATE.duckTimer = 0.8; // Duck duration in seconds

                // Visually squash the player
                player.scale.y = 0.4;
                player.position.y = 0.3; // Lower to ground
            }
        }

        // --- Procedural Generation ---

        function spawnObstacles() {
            // Determine difficulty based on speed
            const difficulty = Math.min(1, STATE.speed / CONFIG.maxSpeed);

            // Number of obstacles in this row (1 or 2, never 3 to guarantee a path)
            let numObstacles = Math.random() > 0.4 + (difficulty * 0.3) ? 1 : 2;

            // Available lanes: -1, 0, 1
            let availableLanes = [-1, 0, 1];

            // Shuffle array
            availableLanes.sort(() => Math.random() - 0.5);

            for (let i = 0; i < numObstacles; i++) {
                const lane = availableLanes[i];

                // Determine obstacle type based on random + difficulty
                let typeRand = Math.random();
                let type = 'block'; // Default: Full block (must dodge)

                if (typeRand < 0.3) type = 'low';      // Jump over
                else if (typeRand < 0.6) type = 'high'; // Duck under

                createObstacle(lane, type);
            }
        }

        function createObstacle(lane, type) {
            let mesh, geo, mat;
            let yPos = 1;

            if (type === 'block') {
                geo = geometries.block;
                mat = materials.block;
                yPos = 1;
            } else if (type === 'low') {
                geo = geometries.low;
                mat = materials.low;
                yPos = 0.5;
            } else if (type === 'high') {
                geo = geometries.high;
                mat = materials.high;
                yPos = 2.5; // High enough to duck under, too high to jump over easily
            }

            mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(lane * CONFIG.laneWidth, yPos, CONFIG.spawnZDistance);

            scene.add(mesh);

            // Create AABB Box for collision
            let box = new THREE.Box3().setFromObject(mesh);
            // Slight padding to make gameplay feel fair (forgiving hitboxes)
            box.expandByScalar(-0.1);

            obstacles.push({ mesh, box, type });
        }

        // --- Game Loop & Updates ---

        function gameLoop() {
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent huge jumps on lag

            if (STATE.isPlaying) {
                if (!STATE.isPaused) {
                    updatePhysics(delta);
                    updateEnvironment(delta);
                    updateHUD();
                    checkCollisions();
                }
            } else {
                // Background animation when dead/menu
                gridHelper.position.z += 5 * delta;
                if (gridHelper.position.z > 5) gridHelper.position.z -= 5;
                
                // Idle star movement
                const positions = starGeo.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 2] += 10 * delta;
                    if (positions[i + 2] > 50) positions[i + 2] -= 300;
                }
                starGeo.attributes.position.needsUpdate = true;
                
                player.rotation.y += delta * 0.5;
            }

            renderer.render(scene, camera);
        }

        function updatePhysics(delta) {
            // Horizontal Lane LERP (Smooth transition)
            const targetX = STATE.lane * CONFIG.laneWidth;
            player.position.x += (targetX - player.position.x) * 15 * delta;

            // Adding a slight tilt based on horizontal movement
            player.rotation.z = (player.position.x - targetX) * -0.1;
            // Forward rotation for effect
            player.rotation.x -= STATE.speed * delta * 0.1;

            // Vertical Jump Physics
            if (STATE.isJumping) {
                STATE.yVelocity += CONFIG.gravity * delta;
                player.position.y += STATE.yVelocity * delta;

                // Landing
                const baseY = 0.75;
                if (player.position.y <= baseY) {
                    player.position.y = baseY;
                    STATE.isJumping = false;
                    STATE.yVelocity = 0;

                    // Reset rotation perfectly
                    player.rotation.x = 0;
                }
            }

            // Ducking Logic
            if (STATE.isDucking) {
                STATE.duckTimer -= delta;
                if (STATE.duckTimer <= 0) {
                    STATE.isDucking = false;
                    player.scale.y = 1;
                    if (!STATE.isJumping) player.position.y = 0.75;
                }
            }

            // Update Player Bounding Box
            playerBox.setFromObject(player);
            // Shrink player bounding box slightly for forgiving gameplay
            playerBox.expandByScalar(-0.15);
        }

        function updateEnvironment(delta) {
            // Calculate movement amount
            const moveAmount = STATE.speed * delta;
            STATE.distance += moveAmount;
            distanceSinceLastSpawn += moveAmount;

            // Gradually increase speed
            STATE.speed = Math.min(CONFIG.maxSpeed, CONFIG.baseSpeed + (STATE.distance * CONFIG.speedMultiplier));

            // Move Grid to simulate forward motion (modulo trick for infinite loop)
            const gridSpacing = 5; // 200 size / 40 segments = 5
            gridHelper.position.z += moveAmount;
            if (gridHelper.position.z > 0) {
                gridHelper.position.z -= gridSpacing;
            }

            // Move Stars for speed effect (moves faster than ground for parallax)
            const positions = starGeo.attributes.position.array;
            const starMoveAmount = moveAmount * 1.5; // Parallax effect
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 2] += starMoveAmount;
                // Reset star to back if it passes camera
                if (positions[i + 2] > 20) {
                    positions[i + 2] -= 300;
                    // Randomize x/y on respawn to make it feel infinite
                    positions[i] = (Math.random() - 0.5) * 200;
                    positions[i + 1] = Math.random() * 50;
                }
            }
            starGeo.attributes.position.needsUpdate = true;

            // Update Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];

                // Move obstacle towards player
                obs.mesh.position.z += moveAmount;

                // Update Bounding Box
                obs.box.setFromObject(obs.mesh);
                obs.box.expandByScalar(-0.1);

                // Despawn passed obstacles
                if (obs.mesh.position.z > CONFIG.despawnZDistance) {
                    scene.remove(obs.mesh);
                    // Dispose geometry/material to prevent memory leaks (optional since we reuse refs, but good practice if unique)
                    obstacles.splice(i, 1);
                }
            }

            // Spawn new obstacles
            // Interval decreases as speed increases
            currentSpawnInterval = Math.max(25, 60 - (STATE.speed * 0.3));

            if (distanceSinceLastSpawn > currentSpawnInterval) {
                spawnObstacles();
                distanceSinceLastSpawn = 0;
            }
        }

        function checkCollisions() {
            for (let obs of obstacles) {
                // Only check collision if obstacle is relatively close to player Z
                if (Math.abs(obs.mesh.position.z - player.position.z) < 5) {
                    if (playerBox.intersectsBox(obs.box)) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = `距離: ${Math.floor(STATE.distance)} m`;

            // Convert internal speed to a visual KM/H for coolness
            const displaySpeed = Math.floor(STATE.speed * 3.6);
            speedDisplay.innerText = `速度: ${displaySpeed} km/h`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Kickoff
        window.onload = init;

    </script>
</body>
